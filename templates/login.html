<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>로그인 — 쿠팡 × 워드프레스</title>
  <style>
    :root {
      --bg: #0f1117;
      --card: #1a1d27;
      --border: #2e3248;
      --primary: #4f6ef7;
      --primary-dark: #3a57e8;
      --error: #ef4444;
      --text: #e2e8f0;
      --muted: #8892aa;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Segoe UI', -apple-system, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .login-box {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 44px 40px;
      width: 100%;
      max-width: 400px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.5);
    }
    .logo {
      width: 56px; height: 56px;
      background: linear-gradient(135deg, var(--primary), #7c3aed);
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 26px;
      margin: 0 auto 20px;
    }
    h1 {
      text-align: center;
      font-size: 1.25rem;
      margin-bottom: 6px;
    }
    p.sub {
      text-align: center;
      font-size: 0.82rem;
      color: var(--muted);
      margin-bottom: 32px;
    }
    label {
      display: block;
      font-size: 0.8rem;
      color: var(--muted);
      margin-bottom: 6px;
      font-weight: 500;
    }
    input[type="password"] {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 11px 14px;
      border-radius: 10px;
      font-size: 0.95rem;
      outline: none;
      transition: border-color 0.2s;
      margin-bottom: 20px;
    }
    input[type="password"]:focus {
      border-color: var(--primary);
    }
    button {
      width: 100%;
      background: var(--primary);
      color: #fff;
      border: none;
      padding: 13px;
      border-radius: 10px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
    }
    button:hover { background: var(--primary-dark); transform: translateY(-1px); }
    button:active { transform: translateY(0); }
    .error-msg {
      background: rgba(239,68,68,0.12);
      border: 1px solid rgba(239,68,68,0.3);
      color: var(--error);
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 0.85rem;
      margin-bottom: 18px;
      text-align: center;
    }
    .hint {
      text-align: center;
      font-size: 0.75rem;
      color: var(--muted);
      margin-top: 18px;
    }
  </style>
</head>
<body>
  <div class="login-box">
    <div class="logo">🐜</div>
    <h1>쿠팡 × 워드프레스</h1>
    <p class="sub">대시보드에 접근하려면 비밀번호를 입력하세요</p>

    {% if error %}
    <div class="error-msg">{{ error }}</div>
    {% endif %}

    <form method="POST">
      <label for="password">비밀번호</label>
      <input type="password" id="password" name="password" placeholder="••••••••" autofocus/>
      <button type="submit">로그인 →</button>
    </form>

    <p class="hint">.env 파일의 DASHBOARD_PASSWORD 값으로 로그인</p>
  </div>
</body>
</html>
